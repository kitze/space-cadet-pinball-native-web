<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Space Cadet Pinball Native Web</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="appShell">
      <aside class="hudPanel" aria-label="Game status">
        <div class="brandBlock">
          <div class="brandKicker">Native Web</div>
          <h1>Space Cadet</h1>
        </div>

        <div class="scoreStack">
          <div class="scoreLabel">Score</div>
          <output id="scoreValue" class="scoreValue">0</output>
          <div class="statGrid">
            <div>
              <span>Ball</span>
              <output id="ballValue">1</output>
            </div>
            <div>
              <span>Mode</span>
              <output id="modeValue">Ready</output>
            </div>
          </div>
        </div>

        <div class="buttonGrid" aria-label="Game controls">
          <button id="newGameButton" class="commandButton" type="button" title="New game">New</button>
          <button id="launchButton" class="commandButton accent" type="button" title="Launch ball">Launch</button>
          <label class="commandButton fileButton" title="Load PINBALL.DAT or CADET.DAT">
            DAT
            <input id="datInput" type="file" accept=".dat,.DAT">
          </label>
          <button id="debugButton" class="iconButton" type="button" aria-pressed="false" title="Toggle collision view">
            <span aria-hidden="true">◎</span>
          </button>
        </div>

        <output id="assetStatus" class="assetStatus">Layered imagegen table</output>
      </aside>

      <main class="playfieldShell">
        <div class="canvasFrame" id="dropZone">
          <canvas id="playfield" width="600" height="416" aria-label="Space Cadet Pinball playfield"></canvas>
          <div class="touchControls" aria-label="Touch controls">
            <button class="touchButton" type="button" data-touch="left" title="Left flipper">L</button>
            <button class="touchButton plunger" type="button" data-touch="plunger" title="Plunger">Launch</button>
            <button class="touchButton" type="button" data-touch="right" title="Right flipper">R</button>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./src/main"></script>
  </body>
</html>
